<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>All Movies</title></head>
<body>
    <h1 style="color:#2a4d8f;">Welcome to Movie App</h1>
    <a th:href="@{/addMovie}">Add Movies</a>&nbsp;|&nbsp;
    <a th:href="@{/allMovies}">Search All Movies</a>&nbsp;|&nbsp;
    <a th:href="@{/searchMovie}">Search Movie By Category</a>
    <br/><br/>

    <h3>All Movies</h3>

    <p th:if="${successMessage != null}" th:text="${successMessage}" style="color:green;"></p>
    <p th:if="${errorMessage != null}" th:text="${errorMessage}" style="color:red;"></p>

    <div th:if="${movies != null and !#lists.isEmpty(movies)}">
        <table border="1" cellpadding="5">
            <tr>
                <th>ID</th>
                <th>Movie Name</th>
                <th>Rating</th>
                <th>Genre</th>
                <th>Update</th>
                <th>Delete</th>
            </tr>
            <tr th:each="movie : ${movies}">
                <td th:text="${movie.id}"></td>
                <td th:text="${movie.movieName}"></td>
                <td th:text="${movie.rating}"></td>
                <td th:text="${movie.genre}"></td>
                <td><a th:href="@{/editMovie/{id}(id=${movie.id})}">Edit</a></td>
                <td><a th:href="@{/deleteMovie/{id}(id=${movie.id})}"
                       onclick="return confirm('Are you sure you want to delete this movie?')">Delete</a></td>
            </tr>
        </table>
    </div>

    <div th:if="${movies == null or #lists.isEmpty(movies)}">
        <p>No movies found.</p>
    </div>
</body>
</html>
