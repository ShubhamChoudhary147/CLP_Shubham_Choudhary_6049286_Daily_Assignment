<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>All Movies — CineVault</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --card: #16161f;
      --border: rgba(255,255,255,0.07); --accent: #e8b400; --accent2: #ff6b35;
      --text: #e8e8f0; --muted: #6b6b80; --success: #22c55e; --error: #ef4444;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,180,0,0.07) 0%, transparent 60%);
    }
    nav {
      display: flex; align-items: center; gap: 8px; padding: 18px 40px;
      border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
    }
    .brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 4px; color: var(--accent); text-decoration: none; margin-right: auto; }
    .brand span { color: var(--muted); }
    nav a:not(.brand) { color: var(--muted); text-decoration: none; font-size: 0.84rem; font-weight: 500; padding: 8px 16px; border-radius: 8px; border: 1px solid transparent; transition: all 0.2s; }
    nav a:not(.brand):hover { color: var(--text); border-color: var(--border); background: var(--card); }
    nav a.active { color: var(--accent); border-color: rgba(232,180,0,0.25); background: rgba(232,180,0,0.06); }

    .page { max-width: 960px; margin: 0 auto; padding: 48px 24px; }

    .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
    .page-head-left .breadcrumb { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .page-head-left .breadcrumb a { color: var(--muted); text-decoration: none; }
    .page-head-left .breadcrumb a:hover { color: var(--accent); }
    .page-head-left h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 4px; }
    .page-head-left h1 span { color: var(--accent); }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 22px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
    .btn-primary { background: var(--accent); color: #0a0a0f; }
    .btn-primary:hover { background: #f5c400; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,180,0,0.25); }

    .alert { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 9px; margin-bottom: 20px; font-size: 0.875rem; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .alert-success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); color: var(--success); }
    .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: var(--error); }

    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .table-head-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .table-head-bar h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--muted); }
    .count-badge { font-size: 0.78rem; color: var(--muted); background: var(--surface); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); }

    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 13px 20px; text-align: left; font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); background: var(--surface); border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(232,180,0,0.02); }
    tbody td { padding: 15px 20px; font-size: 0.9rem; vertical-align: middle; }

    .movie-id { color: var(--muted); font-size: 0.78rem; font-family: 'Courier New', monospace; }
    .movie-name { font-weight: 500; }

    .rating-wrap { display: flex; align-items: center; gap: 6px; }
    .rating-bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .rating-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; }
    .rating-num { font-size: 0.82rem; color: var(--accent); font-weight: 600; }

    .genre-badge { display: inline-flex; align-items: center; padding: 4px 11px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .genre-Drama   { background: rgba(168,85,247,0.1); color: #c084fc; border: 1px solid rgba(168,85,247,0.2); }
    .genre-Fiction { background: rgba(59,130,246,0.1); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
    .genre-Satire  { background: rgba(232,180,0,0.1); color: var(--accent); border: 1px solid rgba(232,180,0,0.2); }

    .td-actions { display: flex; gap: 8px; align-items: center; }
    .btn-edit {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 7px; font-size: 0.78rem; font-weight: 600;
      background: rgba(232,180,0,0.08); color: var(--accent);
      border: 1px solid rgba(232,180,0,0.2); text-decoration: none; transition: all 0.2s;
    }
    .btn-edit:hover { background: rgba(232,180,0,0.15); }
    .btn-del {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 7px; font-size: 0.78rem; font-weight: 600;
      background: rgba(239,68,68,0.08); color: var(--error);
      border: 1px solid rgba(239,68,68,0.2); text-decoration: none; transition: all 0.2s;
    }
    .btn-del:hover { background: rgba(239,68,68,0.16); }

    .empty-state { text-align: center; padding: 72px 24px; }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.5; }
    .empty-state p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" th:href="@{/}">CINE<span>VAULT</span></a>
    <a th:href="@{/addMovie}">＋ Add Movie</a>
    <a class="active" th:href="@{/allMovies}">All Movies</a>
    <a th:href="@{/searchMovie}">By Genre</a>
  </nav>

  <div class="page">
    <div class="page-head">
      <div class="page-head-left">
        <div class="breadcrumb"><a th:href="@{/}">Home</a> / All Movies</div>
        <h1>ALL <span>MOVIES</span></h1>
      </div>
      <a th:href="@{/addMovie}" class="btn btn-primary">＋ Add Movie</a>
    </div>

    <div th:if="${successMessage != null}" class="alert alert-success">
      ✓ <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage != null}" class="alert alert-error">
      ⚠ <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${movies != null and !#lists.isEmpty(movies)}" class="table-wrap">
      <div class="table-head-bar">
        <h2>COLLECTION</h2>
        <span class="count-badge" th:text="${#lists.size(movies)} + ' movies'">0 movies</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Movie Name</th>
            <th>Rating</th>
            <th>Genre</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="movie : ${movies}">
            <td><span class="movie-id" th:text="'#' + ${movie.id}"></span></td>
            <td><span class="movie-name" th:text="${movie.movieName}"></span></td>
            <td>
              <div class="rating-wrap">
                <div class="rating-bar">
                  <div class="rating-fill" th:style="'width:' + (${movie.rating} * 10) + '%'"></div>
                </div>
                <span class="rating-num" th:text="${movie.rating}"></span>
              </div>
            </td>
            <td>
              <span class="genre-badge"
                th:classappend="'genre-' + ${movie.genre}"
                th:text="${movie.genre}"></span>
            </td>
            <td>
              <div class="td-actions">
                <a class="btn-edit" th:href="@{/editMovie/{id}(id=${movie.id})}">✏ Edit</a>
                <a class="btn-del" th:href="@{/deleteMovie/{id}(id=${movie.id})}"
                   onclick="return confirm('Delete this movie from your collection?')">✕ Delete</a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div th:if="${movies == null or #lists.isEmpty(movies)}" class="table-wrap">
      <div class="empty-state">
        <div class="icon">🎞</div>
        <p>Your collection is empty. Add your first movie!</p>
        <a th:href="@{/addMovie}" class="btn btn-primary">＋ Add Movie</a>
      </div>
    </div>
  </div>
</body>
</html>
